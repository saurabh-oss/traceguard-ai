<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630"
     font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <defs>
    <radialGradient id="g1" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="88%" cy="88%" r="45%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0L0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow-shield" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="#020817"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#14b8a6"/>

  <!-- Outer border -->
  <rect x="5" y="1" width="1194" height="628"
        fill="none" stroke="rgba(20,184,166,0.12)" stroke-width="1"/>

  <!-- ── Top-right shield (decorative) ── -->
  <g opacity="0.06" transform="translate(960,30) scale(2.8)">
    <path d="M50 14 L80 27 L80 51 C80 68 67 82 50 88 C33 82 20 68 20 51 L20 27 Z"
          fill="#14b8a6" stroke="none"/>
  </g>

  <!-- ── Logo row ── -->
  <!-- Dot -->
  <circle cx="88" cy="108" r="9" fill="#14b8a6" opacity="0.9"/>
  <circle cx="88" cy="108" r="18" fill="rgba(20,184,166,0.12)"/>
  <!-- Brand name -->
  <text x="110" y="118" font-size="26" font-weight="700"
        fill="#f1f5f9" letter-spacing="-0.3">TraceGuard AI</text>

  <!-- LLMOps badge -->
  <rect x="110" y="133" width="198" height="26" rx="13"
        fill="rgba(20,184,166,0.09)" stroke="rgba(20,184,166,0.28)" stroke-width="1"/>
  <text x="209" y="150" font-size="11" font-weight="700"
        fill="#14b8a6" text-anchor="middle" letter-spacing="1.8">LLMOPS · SELF-HEALING</text>

  <!-- ── Main headline ── -->
  <text x="88" y="278" font-size="80" font-weight="900"
        fill="#f1f5f9" letter-spacing="-2.5">Autonomous Quality</text>

  <text x="88" y="370" font-size="80" font-weight="900" letter-spacing="-2.5">
    <tspan fill="#14b8a6" filter="url(#text-glow)">Firewall</tspan>
    <tspan fill="#f1f5f9"> for LLM Agents</tspan>
  </text>

  <!-- ── Tagline ── -->
  <text x="88" y="422" font-size="22" font-weight="400"
        fill="rgba(148,163,184,0.85)" letter-spacing="0.1">
    Detect failing traces · Generate patch PRs · Evaluate &amp; approve — automatically.
  </text>

  <!-- ── Pipeline steps ── -->
  <!-- Step boxes -->
  <g transform="translate(88, 460)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="148" height="50" rx="10"
          fill="rgba(20,184,166,0.09)" stroke="rgba(20,184,166,0.25)" stroke-width="1"/>
    <text x="74" y="20" font-size="11" font-weight="700"
          fill="#14b8a6" text-anchor="middle" letter-spacing="0.8">STEP 1</text>
    <text x="74" y="38" font-size="15" font-weight="700"
          fill="#f1f5f9" text-anchor="middle">Classify</text>

    <!-- Arrow -->
    <text x="162" y="30" font-size="18" fill="rgba(148,163,184,0.4)" text-anchor="middle">→</text>

    <!-- Step 2 -->
    <rect x="175" y="0" width="148" height="50" rx="10"
          fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.22)" stroke-width="1"/>
    <text x="249" y="20" font-size="11" font-weight="700"
          fill="#a78bfa" text-anchor="middle" letter-spacing="0.8">STEP 2</text>
    <text x="249" y="38" font-size="15" font-weight="700"
          fill="#f1f5f9" text-anchor="middle">Patch Bot</text>

    <!-- Arrow -->
    <text x="337" y="30" font-size="18" fill="rgba(148,163,184,0.4)" text-anchor="middle">→</text>

    <!-- Step 3 -->
    <rect x="350" y="0" width="148" height="50" rx="10"
          fill="rgba(251,191,36,0.07)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
    <text x="424" y="20" font-size="11" font-weight="700"
          fill="#fbbf24" text-anchor="middle" letter-spacing="0.8">STEP 3</text>
    <text x="424" y="38" font-size="15" font-weight="700"
          fill="#f1f5f9" text-anchor="middle">Eval Writer</text>

    <!-- Arrow -->
    <text x="512" y="30" font-size="18" fill="rgba(148,163,184,0.4)" text-anchor="middle">→</text>

    <!-- Step 4 -->
    <rect x="525" y="0" width="148" height="50" rx="10"
          fill="rgba(251,146,60,0.07)" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
    <text x="599" y="20" font-size="11" font-weight="700"
          fill="#fb923c" text-anchor="middle" letter-spacing="0.8">STEP 4</text>
    <text x="599" y="38" font-size="15" font-weight="700"
          fill="#f1f5f9" text-anchor="middle">Shadow Run</text>

    <!-- Arrow -->
    <text x="687" y="30" font-size="18" fill="rgba(148,163,184,0.4)" text-anchor="middle">→</text>

    <!-- Step 5 -->
    <rect x="700" y="0" width="148" height="50" rx="10"
          fill="rgba(74,222,128,0.07)" stroke="rgba(74,222,128,0.22)" stroke-width="1"/>
    <text x="774" y="20" font-size="11" font-weight="700"
          fill="#4ade80" text-anchor="middle" letter-spacing="0.8">STEP 5</text>
    <text x="774" y="38" font-size="15" font-weight="700"
          fill="#f1f5f9" text-anchor="middle">Approve</text>
  </g>

  <!-- ── Bottom bar ── -->
  <rect x="5" y="580" width="1190" height="49"
        fill="rgba(20,184,166,0.04)" stroke="none"/>
  <line x1="5" y1="580" x2="1195" y2="580"
        stroke="rgba(20,184,166,0.12)" stroke-width="1"/>

  <!-- Bottom-left: tech stack -->
  <text x="88" y="611" font-size="16" fill="rgba(148,163,184,0.65)">
    LangGraph · Groq · FastAPI · React 19 · LangSmith
  </text>

  <!-- Bottom-right: repo -->
  <text x="1112" y="611" font-size="16" font-weight="600"
        fill="rgba(20,184,166,0.75)" text-anchor="end">
    github.com/saurabh-oss/traceguard-ai
  </text>
</svg>
