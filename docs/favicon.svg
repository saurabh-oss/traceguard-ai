<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#020817"/>

  <!-- Glow layer -->
  <rect width="100" height="100" rx="20" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="19" fill="none"
        stroke="rgba(20,184,166,0.35)" stroke-width="1.5"/>

  <!-- Shield body -->
  <path d="M50 14 L80 27 L80 51 C80 68 67 82 50 88 C33 82 20 68 20 51 L20 27 Z"
        fill="rgba(20,184,166,0.10)" stroke="#14b8a6" stroke-width="3"
        stroke-linejoin="round"/>

  <!-- Glow behind checkmark -->
  <polyline points="34,51 45,63 66,39"
            stroke="#14b8a6" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none" opacity="0.25" filter="url(#blur)"/>

  <!-- Checkmark -->
  <polyline points="34,51 45,63 66,39"
            stroke="#14b8a6" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>
</svg>
